apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: mysql-monitor
  namespace: monitoring
  labels:
    release: devops-monitoring

spec:
  selector:
    matchLabels:
      app: mysql

  namespaceSelector:
    matchNames:
      - devops-platform

  endpoints:
    - port: metrics
      interval: 15s
      scrapeTimeout: 10s