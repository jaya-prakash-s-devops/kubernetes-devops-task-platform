apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: devops-platform
  labels:
    app: frontend

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: jsdaya2211/frontend:2026.06.21-1917
          imagePullPolicy: Always

          ports:
            - containerPort: 80


          readinessProbe:
            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 10
            periodSeconds: 10


          livenessProbe:
            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 30
            periodSeconds: 20

          securityContext:
            allowPrivilegeEscalation: false

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"