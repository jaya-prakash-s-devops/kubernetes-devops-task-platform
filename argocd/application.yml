apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-platform
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/jaya-prakash-s-devops/kubernetes-devops-task-platform.git
    targetRevision: production-v2
    path: .
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true