apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: backend-alerts
  namespace: monitoring
  labels:
    release: monitoring

spec:
  groups:
  - name: backend.rules
    rules:

    - alert: BackendDown
      expr: up{job="backend"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Backend is down
        description: Backend metrics endpoint not reachable

    - alert: BackendTargetMissing
      expr: absent(up{job="backend"})
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Backend target missing
        description: Backend target disappeared from Prometheus

    - alert: BackendReplicasLow
      expr: kube_deployment_status_replicas_available{deployment="backend"} < 3
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: Backend replicas low
        description: Less than 3 backend pods available