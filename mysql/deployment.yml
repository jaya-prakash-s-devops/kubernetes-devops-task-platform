apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  namespace: devops-platform
  labels:
    app: mysql

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:

        - name: mysql
          image: mysql:8

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password

            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-database

            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost

            initialDelaySeconds: 20
            periodSeconds: 10

        - name: mysqld-exporter
          image: prom/mysqld-exporter:v0.14.0

          env:
           - name: DATA_SOURCE_NAME
             value: "root:rootpassword@(127.0.0.1:3306)/"

          ports:
            - containerPort: 9104
              name: metrics

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

