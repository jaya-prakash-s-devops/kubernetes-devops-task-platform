apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    release: monitoring

spec:
  jobLabel: app

  selector:
    matchLabels:
      app: backend

  namespaceSelector:
    matchNames:
      - devops-platform

  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s