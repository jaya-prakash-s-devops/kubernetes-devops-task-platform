name: DevOps Platform CI

on:
  push:
    branches:
      - production-v2

env:
  BACKEND_IMAGE: jsdaya2211/backend-image
  FRONTEND_IMAGE: jsdaya2211/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Image Tag
        id: tag
        run: |
          TAG=$(date +'%Y.%m.%d-%H%M')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
            -t $BACKEND_IMAGE:${{ steps.tag.outputs.tag }} \
            -t $BACKEND_IMAGE:latest \
            -f backend-src/Dockerfile \
            backend-src

      - name: Push Backend Images
        run: |
          docker push $BACKEND_IMAGE:${{ steps.tag.outputs.tag }}
          docker push $BACKEND_IMAGE:latest

      - name: Build Frontend Image
        run: |
          docker build \
            -t $FRONTEND_IMAGE:${{ steps.tag.outputs.tag }} \
            -t $FRONTEND_IMAGE:latest \
            -f frontend-src/Dockerfile \
            frontend-src

      - name: Push Frontend Images
        run: |
          docker push $FRONTEND_IMAGE:${{ steps.tag.outputs.tag }}
          docker push $FRONTEND_IMAGE:latest

      - name: Summary
        run: |
          echo "Backend: $BACKEND_IMAGE:${{ steps.tag.outputs.tag }}"
          echo "Frontend: $FRONTEND_IMAGE:${{ steps.tag.outputs.tag }}"